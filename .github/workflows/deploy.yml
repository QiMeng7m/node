name: Deploy to Alibaba Cloud ECS (dev branch)

on:
  push:
    branches: [ dev ]  # 仅监听 dev 分支

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (if needed)
        run: npm run build
        continue-on-error: true  # 若无 build 脚本则跳过

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}        # 使用您配置的 HOST
          username: ${{ secrets.USERNAME }} # 应为 admin
          key: ${{ secrets.DEPLOY_KEY }}   # 您的私钥内容
          port: 22
          script: |
            cd /home/admin/my-node-backend
            git pull origin dev
            npm ci --production
            npm run build || echo "No build required"
            pm2 reload my-app || pm2 start app.js --name "my-app"