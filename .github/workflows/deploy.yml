name: Deploy Backend

on:
  push:
    branches: [ dev ]  # 根据您的主分支调整

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'  # 根据项目需求调整版本

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Deploy via SSH
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.DEPLOY_KEY }}
          source: "dist,package.json,package-lock.json,prisma"
          target: "/var/www/my-backend"

      # 步骤1：部署应用（日常使用）
      - name: Deploy app
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.DEPLOY_KEY }}
          timeout: 60s   # 增加超时时间
          script: |
            set -e
            cd /var/www/my-backend
            npm ci --omit=dev
            npx prisma generate
            pkill -f "[n]ode dist/index.js" || true
            sleep 1
            nohup node dist/index.js > index.log 2>&1 </dev/null &
            exit 0

      # 步骤2：仅在需要时才启用（例如手动触发或特定条件）
      - name: Restart server (optional)
        if: github.event.inputs.restart_server == 'true'  # 示例条件
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            nohup sh -c 'sleep 5 && sudo reboot' > /dev/null 2>&1 &