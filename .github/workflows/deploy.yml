name: Deploy Node.js App to Alibaba Cloud

on:
  push:
    branches: [ dev ]  # 当 main 分支有推送时触发

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'  # 根据您的项目调整版本

      - name: Install dependencies
        run: npm ci

      - name: Build (if needed)
        run: npm run build  # 如果是 Next.js、NestJS 等需要构建的项目

      - name: Deploy to Alibaba Cloud ECS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}        # 您的ECS公网IP
          username: ${{ secrets.USERNAME }}    # 通常是 root 或 ubuntu
          key: ${{ secrets.DEPLOY_KEY }}      # 私钥（PEM内容）
          port: 22
          script: |
            cd /home/admin/my-node-backend
            git pull origin dev
            npm ci
            pm2 reload app || pm2 start app.js --name "app"