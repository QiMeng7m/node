name: Deploy Backend

on:
  push:
    branches: [ dev ]  # 根据您的主分支调整

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'  # 根据项目需求调整版本

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Prune dev dependencies
        run: npm prune --production

      - name: Deploy via SSH
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.DEPLOY_KEY }}
          source: "dist/*"
          target: "/var/www/my-backend"
          strip_components: 1

      - name: Restart service (optional)
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd /var/www/my-backend
            npm install --only=production
            pkill -f "node dist/index.js" || true  # 先杀掉旧进程（可选）
            nohup node dist/index.js > index.log 2>&1 &