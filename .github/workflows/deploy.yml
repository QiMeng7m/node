name: Deploy Frontend

on:
  push:
    branches: [ dev ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Build frontend
        run: |
          cd client
          npm ci
          npm run build

      - name: Debug - List built files
        run: ls -la client/dist/ || echo "Build failed or dist/ not found!"

      - name: Deploy to server via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.DEPLOY_KEY }}
          source: "client/dist/*"
          target: "/usr/share/nginx/html/"
          strip_components: 1
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json
      - name: Build backend
        run: |
          cd server
          npm ci
          npm run build
      - name: Debug - Check server directory after build
        run: |
          ls -la server/ || echo "server/ not found!"
          ls -la server/dist/ || echo "server/dist/ not found!"
      - name: Debug - List backend built files
        run: ls -la server/dist/ || echo "Backend build failed or dist/ not found!"
      - name: Debug - Check tsconfig.json existence
        run: |
          ls -la server/
          cat server/tsconfig.json || echo "tsconfig.json NOT FOUND!"
      - name: Test SSH Connection (Temporary)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.DEPLOY_KEY }}
          source: "client/dist/index.html"  # 复用前端文件
          target: "/tmp/test-deploy/"