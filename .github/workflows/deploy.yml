name: Deploy Node.js App to Alibaba Cloud

on:
  push:
    branches: [ dev ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (validate before deploy)
        run: npm run build

      - name: Deploy to Alibaba Cloud ECS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: 22
          script_stop: true
          script: |
            set -euo pipefail

            APP_DIR="/home/admin/my-node-backend"
            REPO="https://github.com/${{ github.repository }}.git"
            BRANCH="dev"

            # 首次部署：目录不存在或不是 git 仓库时 clone
            if [ ! -d "$APP_DIR/.git" ]; then
              mkdir -p "$(dirname "$APP_DIR")"
              if [ -d "$APP_DIR" ] && [ "$(ls -A "$APP_DIR" 2>/dev/null)" ]; then
                echo "ERROR: $APP_DIR exists but is not a git repo."
                echo "Remove it or run: git clone -b $BRANCH $REPO $APP_DIR"
                exit 1
              fi
              git clone -b "$BRANCH" "$REPO" "$APP_DIR"
            fi

            cd "$APP_DIR"
            git fetch origin "$BRANCH"
            git reset --hard "origin/$BRANCH"

            if [ ! -f package-lock.json ]; then
              echo "ERROR: package-lock.json missing after git sync"
              exit 1
            fi

            npm ci
            npm run build
            npx prisma migrate deploy

            if ! command -v pm2 >/dev/null 2>&1; then
              npm install -g pm2
            fi

            pm2 reload app 2>/dev/null || pm2 start npm --name app -- start
            pm2 save
