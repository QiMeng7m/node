<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <script>!function(){var t=localStorage.getItem('mascot-theme');if(t&&t!=='catdog')document.documentElement.setAttribute('data-theme',t)}();</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#ff7eb3" />
  <title>文档生成 — 喵汪 AI 工坊</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="app-layout has-bottom-nav">
  <div class="mockup-banner">
    表单场景 · iPad/手机适配 🌸 · <a href="chat.html">对话页</a>
  </div>

  <div class="drawer-overlay" data-drawer-close aria-hidden="true"></div>

  <div class="app-shell">
    <aside class="sidebar">
      <button type="button" class="btn-icon drawer-close-btn" data-drawer-close aria-label="关闭菜单">✕</button>
      <div class="sidebar-header">
        <a href="index.html" class="sidebar-brand" style="text-decoration: none; color: inherit;">
          <div class="logo-mascot" data-theme-logo>🐶</div>
          <div>
            <span data-theme-text="brandShort">喵汪 AI</span>
            <span class="subtitle" data-theme-text="subtitle">AI 工坊</span>
          </div>
        </a>
        <button class="btn btn-primary btn-block" style="margin-top: 16px;" type="button">✨ 新对话</button>
      </div>
      <div class="sidebar-body">
        <div class="sidebar-section-title">🎀 场景功能</div>
        <div class="feature-grid">
          <button type="button" class="feature-chip"><span class="icon">💬</span><span class="name">自由闲聊</span></button>
          <button type="button" class="feature-chip"><span class="icon">🛠</span><span class="name">技术问答</span></button>
          <button type="button" class="feature-chip active"><span class="icon">📄</span><span class="name">文档生成</span></button>
          <button type="button" class="feature-chip"><span class="icon">🖼</span><span class="name">图片分析</span></button>
        </div>
      </div>
      <div style="padding: 14px; border-top: 2px dashed var(--border-soft);">
        <a href="settings.html" style="display: flex; align-items: center; gap: 10px; padding: 10px; font-size: 13px; font-weight: 600; color: var(--text-secondary); text-decoration: none; border-radius: var(--radius);">
          ⚙️ 个人设置
        </a>
      </div>
    </aside>

    <div class="main">
      <div class="feature-scroll" role="tablist">
        <button type="button" class="feature-pill">💬 闲聊</button>
        <button type="button" class="feature-pill">🛠 技术</button>
        <button type="button" class="feature-pill active">📄 文档</button>
        <button type="button" class="feature-pill">🖼 图片</button>
      </div>

      <header class="topbar">
        <div class="topbar-left">
          <button type="button" class="menu-btn" data-drawer-toggle aria-label="打开菜单">☰</button>
          <span class="topbar-title" style="font-weight: 800;">📄 文档生成</span>
        </div>
        <div class="topbar-right">
          <div class="model-select">
            <span class="dot"></span>
            <span>DeepSeek</span>
            <span class="model-tag">strong</span>
            <span style="color: var(--text-muted);">▾</span>
          </div>
          <a href="settings.html" class="user-settings-link" aria-label="个人设置">⚙️</a>
        </div>
      </header>

      <div class="content">
        <div class="content-inner">
        <div class="card">
          <div class="card-cute-header">
            <span style="font-size: 32px;">📝</span>
            <div>
              <strong style="font-size: 16px;">填写文档小要点</strong>
              <div style="font-size: 12px; color: var(--text-muted); margin-top: 2px;" data-theme-text="formHelperDesc">狗狗助手帮你生成美美的 Markdown～</div>
            </div>
          </div>
          <div class="card-body">
            <div class="form-group">
              <label class="label">📌 标题 *</label>
              <input class="input" type="text" style="width: 100%;" value="Q2 技术复盘" />
            </div>
            <div class="form-group">
              <label class="label">📂 文档类型</label>
              <select class="select" style="width: 100%;">
                <option>技术方案</option>
                <option selected>会议纪要</option>
                <option>项目总结</option>
              </select>
            </div>
            <div class="form-group">
              <label class="label">💡 要点 *</label>
              <textarea class="textarea" style="width: 100%;" rows="6">1. 完成 SQLite + Prisma 接入
2. posts API 持久化上线
3. 下一步：AI 对话模块 MVP
4. 风险：上游 API 稳定性</textarea>
            </div>
            <button type="button" class="btn btn-primary btn-block" style="max-width: 100%;">✨ 生成文档</button>
          </div>
        </div>

        <div class="card" style="margin-top: 22px;">
          <div class="card-cute-header">
            <span style="font-size: 28px;">🎉</span>
            <strong>生成结果</strong>
            <button type="button" class="btn btn-ghost btn-sm" style="margin-left: auto;">📋 复制</button>
          </div>
          <div class="card-body">
            <div class="message-content" style="background: var(--surface-2); border: 2px dashed var(--border); box-shadow: none;">
              <p><strong># Q2 技术复盘</strong></p>
              <p><strong>## 一、本季度完成项 🐾</strong></p>
              <p>1. 完成 SQLite + Prisma 数据库接入。<br>2. 建立 DESIGN.md 技术留痕机制。</p>
              <p><strong>## 二、下阶段计划 ✨</strong></p>
              <p>推进 AI 对话 MVP：模型切换、Feature 模板、SSE 流式。</p>
            </div>
          </div>
        </div>
        </div>
      </div>
    </div>
  </div>

  <nav class="bottom-nav" aria-label="主导航">
    <div class="bottom-nav-inner">
      <button type="button" class="bottom-nav-item" data-drawer-toggle>
        <span class="bn-icon">🎀</span><span>场景</span>
      </button>
      <a href="chat.html" class="bottom-nav-item">
        <span class="bn-icon">🐱</span><span>聊天</span>
      </a>
      <a href="chat-doc-form.html" class="bottom-nav-item active">
        <span class="bn-icon">📄</span><span>文档</span>
      </a>
      <a href="admin.html" class="bottom-nav-item">
        <span class="bn-icon">🐾</span><span>管理</span>
      </a>
    </div>
  </nav>

  <script src="responsive.js"></script>
  <script src="themes.js"></script>
</body>
</html>
