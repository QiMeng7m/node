<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <script>!function(){var t=localStorage.getItem('mascot-theme');if(t&&t!=='catdog')document.documentElement.setAttribute('data-theme',t)}();</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#ff7eb3" />
  <title>个人设置 — 喵汪 AI 工坊</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="app-layout">
  <div class="mockup-banner">
    <span class="sparkle">⚙️</span> 个人设置 ·
    <a href="chat.html">返回对话</a> ·
    <a href="index.html">首页</a>
  </div>

  <div class="app-shell">
    <div class="main" style="width: 100%; max-width: 100%;">
      <header class="topbar">
        <div class="topbar-left">
          <a href="chat.html" class="btn btn-ghost btn-sm" style="text-decoration: none; margin-right: 8px;">← 返回</a>
          <span class="topbar-title" style="font-weight: 800;">⚙️ 个人设置</span>
        </div>
        <div class="topbar-right">
          <span style="font-size: 13px; font-weight: 600; color: var(--text-secondary);">admin@example.com</span>
          <a href="login.html" class="btn btn-ghost btn-sm" style="text-decoration: none;">退出</a>
        </div>
      </header>

      <div class="content settings-page">
        <div class="card settings-profile-card">
          <div class="settings-avatar" data-theme-user aria-hidden="true">🧑</div>
          <div>
            <div style="font-weight: 800; font-size: 16px;">admin@example.com</div>
            <div style="font-size: 13px; color: var(--text-muted); margin-top: 4px;">
              <span data-theme-text="adminRole">铲屎官</span> · 额度 🐟 87/100
            </div>
          </div>
        </div>

        <section class="settings-section" aria-labelledby="theme-heading">
          <h2 id="theme-heading">🎨 界面主题</h2>
          <p>选择视觉风格，会在所有页面生效并保存在本机浏览器中。</p>
          <div id="theme-picker" class="theme-picker-grid" role="group" aria-label="选择界面主题"></div>
        </section>

        <section class="settings-section" aria-labelledby="pref-heading">
          <h2 id="pref-heading">🔔 偏好（占位）</h2>
          <p>正式版可在此配置默认模型、消息密度等；当前为 UI 原型。</p>
          <div class="card" style="padding: 16px; font-size: 13px; color: var(--text-secondary);">
            默认场景、Composer 快捷键等待产品定稿后接入。
          </div>
        </section>
      </div>
    </div>
  </div>

  <script src="responsive.js"></script>
  <script src="themes.js"></script>
</body>
</html>
